apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: myapp
          image: myapp:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_PASSWORD
              value: supersecret123
            - name: API_KEY
              value: myapikey123456
